<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f4f4" />
    <title>オフライン - diary-app</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --accent: #46d0cd;
        --bg: #f4f4f4;
        --text: #3e3e3e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      main {
        display: grid;
        width: min(100%, 360px);
        justify-items: center;
        gap: 18px;
        text-align: center;
      }

      img {
        width: 86px;
        height: 86px;
        border-radius: 22px;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.13);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        color: #6f6f6f;
        font-size: 0.96rem;
        font-weight: 700;
        line-height: 1.7;
      }

      a {
        display: inline-grid;
        min-height: 46px;
        place-items: center;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 900;
        padding: 0 22px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./icon.svg" alt="" />
      <h1>オフラインです</h1>
      <p>保存済みのアプリ画面は、通信が戻るともう一度開けます。</p>
      <a href="./index.html">日記に戻る</a>
    </main>
  </body>
</html>
