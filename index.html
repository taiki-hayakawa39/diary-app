<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f4f4" />
    <meta name="application-name" content="diary-app" />
    <meta name="apple-mobile-web-app-title" content="Diary" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="日々の記録を端末内に保存できる日記アプリです。" />
    <title>diary-app</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="listView" class="app-view is-active" aria-labelledby="listTitle">
        <header class="top-bar">
          <button id="jumpCalendarButton" class="round-button" type="button" title="カレンダー">
            <span class="calendar-icon" aria-hidden="true"></span>
          </button>
          <h1 id="listTitle">日記</h1>
          <button id="searchButton" class="round-button" type="button" title="検索">
            <span class="search-icon" aria-hidden="true"></span>
          </button>
        </header>

        <div id="searchPanel" class="search-panel" hidden>
          <input id="searchInput" type="search" placeholder="検索" aria-label="日記を検索" />
        </div>

        <section class="month-section" aria-label="日記リスト">
          <div class="month-section-header">
            <h2 id="listMonthLabel"></h2>
            <button id="listReviewButton" class="review-month-button" type="button">
              今月を振り返る
            </button>
          </div>
          <ul id="entryList" class="entry-list" aria-live="polite"></ul>
        </section>
      </section>

      <section id="calendarView" class="app-view" aria-labelledby="calendarTitle">
        <header class="calendar-header">
          <button id="prevMonthButton" class="flat-arrow" type="button" title="前の月">‹</button>
          <h1 id="calendarTitle"></h1>
          <button id="nextMonthButton" class="flat-arrow" type="button" title="次の月">›</button>
          <button id="todayButton" class="today-button" type="button">今日</button>
        </header>

        <section class="calendar-shell" aria-label="月間カレンダー">
          <div id="weekdayRow" class="weekday-row"></div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <section class="selected-day-section" aria-label="選択日の記録">
          <div class="month-section-header">
            <h2 id="selectedDateHeading"></h2>
            <button id="calendarReviewButton" class="review-month-button" type="button">
              今月を振り返る
            </button>
          </div>
          <ul id="calendarEntryList" class="entry-list compact" aria-live="polite"></ul>
        </section>
      </section>

      <section id="settingsView" class="app-view" aria-labelledby="settingsTitle">
        <header class="settings-header">
          <h1 id="settingsTitle">設定</h1>
        </header>

        <div class="settings-stack">
          <div class="settings-card single">
            <button class="settings-row" type="button">
              <span class="settings-symbol sparkle" aria-hidden="true">✦</span>
              <span>プレミアムサービス</span>
              <span class="chevron">›</span>
            </button>
          </div>

          <div class="settings-card single">
            <button class="settings-row" type="button">
              <span class="settings-symbol cloud" aria-hidden="true"></span>
              <span>iCloudバックアップ</span>
              <span class="lock-icon" aria-hidden="true"></span>
              <span class="chevron">›</span>
            </button>
          </div>

          <div class="settings-card">
            <label id="themeColorRow" class="settings-row native-select-row">
              <span class="settings-symbol palette" aria-hidden="true"></span>
              <span>テーマカラー</span>
              <span id="themeColorLabel" class="setting-value">ミント</span>
              <select id="themeColorSetting" aria-label="テーマカラー">
                <option value="mint">ミント</option>
                <option value="sakura">さくら</option>
                <option value="sky">空</option>
                <option value="lemon">レモン</option>
                <option value="lavender">ラベンダー</option>
                <option value="mono">モノクロ</option>
              </select>
              <span class="chevron">›</span>
            </label>
            <div id="themeColorOptions" class="setting-options color-options" aria-label="テーマカラー" hidden>
              <button class="color-choice" type="button" data-theme="mint">
                <span class="color-dot mint-dot" aria-hidden="true"></span>
                <span>ミント</span>
              </button>
              <button class="color-choice" type="button" data-theme="sakura">
                <span class="color-dot sakura-dot" aria-hidden="true"></span>
                <span>さくら</span>
              </button>
              <button class="color-choice" type="button" data-theme="sky">
                <span class="color-dot sky-dot" aria-hidden="true"></span>
                <span>空</span>
              </button>
              <button class="color-choice" type="button" data-theme="lemon">
                <span class="color-dot lemon-dot" aria-hidden="true"></span>
                <span>レモン</span>
              </button>
              <button class="color-choice" type="button" data-theme="lavender">
                <span class="color-dot lavender-dot" aria-hidden="true"></span>
                <span>ラベンダー</span>
              </button>
              <button class="color-choice" type="button" data-theme="mono">
                <span class="color-dot mono-dot" aria-hidden="true"></span>
                <span>モノクロ</span>
              </button>
            </div>
            <button class="settings-row" type="button">
              <span class="settings-symbol squares" aria-hidden="true"></span>
              <span>アプリアイコン</span>
              <span class="chevron">›</span>
            </button>
            <button id="textSettingRow" class="settings-row expandable-row" type="button" data-setting-panel="text" aria-expanded="false">
              <span class="settings-symbol letters" aria-hidden="true">AA</span>
              <span>文字設定</span>
              <span id="textSettingLabel" class="setting-value">標準</span>
              <span class="chevron">›</span>
            </button>
            <div id="textSettingOptions" class="setting-options text-options" aria-label="文字設定" hidden>
              <div class="option-group">
                <p>文字サイズ</p>
                <div class="segmented-options">
                  <button type="button" data-text-size="small">小さめ</button>
                  <button type="button" data-text-size="normal">標準</button>
                  <button type="button" data-text-size="large">大きめ</button>
                  <button type="button" data-text-size="xlarge">特大</button>
                </div>
              </div>
              <div class="option-group">
                <p>行間</p>
                <div class="segmented-options">
                  <button type="button" data-line-height="compact">せまい</button>
                  <button type="button" data-line-height="normal">標準</button>
                  <button type="button" data-line-height="relaxed">広め</button>
                </div>
              </div>
              <div class="text-preview-box">
                <strong>プレビュー</strong>
                <span>今日のことを、少しずつ書き残していく。</span>
              </div>
            </div>
            <label id="fontStyleRow" class="settings-row native-select-row">
              <span class="settings-symbol letters small" aria-hidden="true">Aa</span>
              <span>フォントスタイル</span>
              <span id="fontStyleLabel" class="setting-value">標準</span>
              <select id="fontStyleSetting" aria-label="フォントスタイル">
                <option value="system">標準</option>
                <option value="serif">明朝</option>
                <option value="rounded">丸ゴシック</option>
                <option value="handwriting">手書き風</option>
              </select>
              <span class="chevron">›</span>
            </label>
            <div id="fontStyleOptions" class="setting-options font-options" aria-label="フォントスタイル" hidden>
              <button class="font-choice" type="button" data-font="system">
                <span class="font-sample system-font">Aa</span>
                <span>標準</span>
              </button>
              <button class="font-choice" type="button" data-font="serif">
                <span class="font-sample serif-font">Aa</span>
                <span>明朝</span>
              </button>
              <button class="font-choice" type="button" data-font="rounded">
                <span class="font-sample rounded-font">Aa</span>
                <span>丸ゴシック</span>
              </button>
              <button class="font-choice" type="button" data-font="handwriting">
                <span class="font-sample handwriting-font">Aa</span>
                <span>手書き風</span>
              </button>
            </div>
          </div>

          <div class="settings-card">
            <label class="settings-row">
              <span class="settings-symbol list-lines" aria-hidden="true"></span>
              <span>リストの表示行数</span>
              <select id="listRowsSetting">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
              </select>
            </label>
            <label class="settings-row">
              <span class="settings-symbol mini-calendar" aria-hidden="true"></span>
              <span>カレンダーの開始曜日</span>
              <select id="weekStartSetting">
                <option value="0" selected>日曜</option>
                <option value="1">月曜</option>
              </select>
            </label>
            <label class="settings-row">
              <span class="settings-symbol mode-symbol" aria-hidden="true">•••</span>
              <span>書き始めモード</span>
              <select id="defaultModeSetting">
                <option value="normal" selected>通常</option>
                <option value="memory">思い出</option>
                <option value="book">book</option>
              </select>
            </label>
            <label class="settings-row">
              <span class="settings-symbol alarm" aria-hidden="true"></span>
              <span>リマインダーの通知</span>
              <input id="reminderSetting" class="switch-input" type="checkbox" />
              <span class="switch-ui" aria-hidden="true"></span>
            </label>
            <label class="settings-row">
              <span class="settings-symbol lock" aria-hidden="true"></span>
              <span>パスコードロック</span>
              <input id="passcodeSetting" class="switch-input" type="checkbox" checked />
              <span class="switch-ui" aria-hidden="true"></span>
            </label>
          </div>

          <div class="settings-card">
            <label class="settings-row">
              <span class="settings-symbol photo-safe" aria-hidden="true"></span>
              <span>振り返りで写真を使う</span>
              <input id="photoReviewSetting" class="switch-input" type="checkbox" checked />
              <span class="switch-ui" aria-hidden="true"></span>
            </label>
            <button id="photoNoticeButton" class="settings-row" type="button">
              <span class="settings-symbol help" aria-hidden="true">?</span>
              <span>顔写真の注意を再表示</span>
              <span class="chevron">›</span>
            </button>
            <button id="photoAuditRow" class="settings-row expandable-row" type="button" data-setting-panel="photos" aria-expanded="false">
              <span class="settings-symbol image-symbol" aria-hidden="true"></span>
              <span>写真つき日記を確認</span>
              <span id="photoAuditCount" class="setting-value">0件</span>
              <span class="chevron">›</span>
            </button>
            <div id="photoAuditOptions" class="setting-options photo-audit-options" aria-label="写真つき日記" hidden>
              <p class="photo-safety-note">
                写真は端末内に保存され、AIや外部サービスには送信しません。
              </p>
              <div id="photoAuditList" class="photo-audit-list"></div>
            </div>
          </div>

          <div class="settings-card">
            <button class="settings-row" type="button">
              <span class="settings-symbol help" aria-hidden="true">?</span>
              <span>ヘルプ／よくある質問</span>
              <span class="chevron">›</span>
            </button>
            <button class="settings-row" type="button">
              <span class="settings-symbol info" aria-hidden="true">i</span>
              <span>アプリについて</span>
              <span class="chevron">›</span>
            </button>
          </div>

          <div class="settings-card">
            <button class="settings-row" type="button">
              <span class="settings-symbol book" aria-hidden="true">A</span>
              <span>利用言語</span>
              <span class="chevron">›</span>
            </button>
            <button id="checkUpdateButton" class="settings-row" type="button">
              <span class="settings-symbol update-symbol" aria-hidden="true"></span>
              <span>アプリを更新</span>
              <span id="updateStatusLabel" class="setting-value">確認</span>
              <span class="chevron">›</span>
            </button>
            <button class="settings-row" type="button">
              <span class="settings-symbol export" aria-hidden="true">A</span>
              <span>日記データの出力（PC閲覧用）</span>
              <span class="lock-icon" aria-hidden="true"></span>
              <span class="chevron">›</span>
            </button>
          </div>

          <div class="settings-card danger-group">
            <button id="deleteMonthButton" class="settings-row danger-text" type="button">
              <span class="settings-symbol trash" aria-hidden="true"></span>
              <span>一部データの削除</span>
              <span class="chevron">›</span>
            </button>
            <button id="deleteAllButton" class="settings-row danger-text" type="button">
              <span class="settings-symbol trash" aria-hidden="true"></span>
              <span>全データの削除</span>
              <span class="chevron">›</span>
            </button>
          </div>
        </div>
      </section>

      <button id="composeButton" class="compose-button" type="button" title="日記を書く">
        <span class="pencil-icon" aria-hidden="true"></span>
      </button>

      <nav class="tab-bar" aria-label="画面切り替え">
        <button class="tab-button is-active" type="button" data-view="list">
          <span class="tab-icon list-tab" aria-hidden="true"></span>
          <span>リスト</span>
        </button>
        <button class="tab-button" type="button" data-view="calendar">
          <span class="tab-icon calendar-tab" aria-hidden="true"></span>
          <span>カレンダー</span>
        </button>
        <button class="tab-button" type="button" data-view="settings">
          <span class="tab-icon settings-tab" aria-hidden="true"></span>
          <span>設定</span>
        </button>
      </nav>

      <dialog id="editorDialog" class="editor-dialog" aria-labelledby="editorTitle">
        <form id="diaryForm" class="diary-form" method="dialog">
          <header class="write-header">
            <button id="closeEditorButton" class="write-circle-button" type="button" title="戻る">
              <span class="back-icon" aria-hidden="true"></span>
            </button>
            <div class="write-date-pill">
              <h2 id="editorTitle"></h2>
              <p id="editorTimeLabel"></p>
            </div>
            <button id="modeMenuButton" class="write-circle-button menu-button" type="button" title="モード切り替え" aria-expanded="false">
              <span aria-hidden="true">•••</span>
            </button>
            <button id="saveEditorButton" class="write-circle-button save-circle-button" type="submit" title="保存">
              <span class="check-icon" aria-hidden="true"></span>
            </button>
          </header>
          <div id="modeMenu" class="mode-menu" hidden>
            <button type="button" data-mode="normal">通常</button>
            <button type="button" data-mode="memory">思い出</button>
            <button type="button" data-mode="book">book</button>
          </div>

          <input id="entryDate" name="entryDate" type="date" required />
          <input
            id="entryTitle"
            class="visually-hidden"
            name="entryTitle"
            type="text"
            maxlength="60"
            tabindex="-1"
          />
          <textarea
            id="entryBody"
            class="mode-field"
            data-mode-field="normal"
            name="entryBody"
            rows="16"
            aria-label="日記本文"
          ></textarea>
          <section class="mode-field mode-panel" data-mode-field="memory" hidden>
            <label>
              <span>相手のセリフ</span>
              <textarea id="memoryQuote" class="compact-source-field" rows="3" placeholder="相手が言ったこと"></textarea>
            </label>
            <label>
              <span>自分がどう思っているか</span>
              <textarea id="memoryFeeling" rows="8" placeholder="その言葉を聞いて感じたこと、考えたこと"></textarea>
            </label>
          </section>
          <section class="mode-field mode-panel" data-mode-field="book" hidden>
            <label>
              <span>本の名前</span>
              <input id="bookTitle" type="text" placeholder="本のタイトル" />
            </label>
            <label>
              <span>印象的だった内容</span>
              <textarea id="bookHighlight" class="compact-source-field" rows="3" placeholder="心に残った一文や場面"></textarea>
            </label>
            <label>
              <span>自分の感想</span>
              <textarea id="bookThought" rows="7" placeholder="読んで感じたこと、考えたこと"></textarea>
            </label>
          </section>
          <input id="photoInput" class="visually-hidden" type="file" accept="image/*" multiple />
          <div id="photoPreviewList" class="photo-preview-list" aria-label="挿入した写真"></div>
          <button id="addPhotoTileButton" class="photo-add-tile" type="button">
            <span class="image-icon" aria-hidden="true"></span>
            <span>写真を追加</span>
          </button>
          <div class="write-toolbox" aria-label="入力ツール">
            <button id="addPhotoButton" type="button" title="画像を追加">
              <span class="image-icon" aria-hidden="true"></span>
            </button>
            <button id="takePhotoButton" type="button" title="写真を撮る">
              <span class="camera-icon" aria-hidden="true"></span>
            </button>
            <button type="button" title="元に戻す" disabled>
              <span class="undo-icon" aria-hidden="true"></span>
            </button>
            <button type="button" title="やり直す" disabled>
              <span class="redo-icon" aria-hidden="true"></span>
            </button>
          </div>
          <button id="deleteEntryButton" class="delete-entry-button" type="button" hidden>
            この日記を削除
          </button>
        </form>
      </dialog>

      <dialog id="reviewDialog" class="review-dialog" aria-labelledby="reviewTitle">
        <section class="review-shell">
          <header class="review-header">
            <button id="closeReviewButton" class="review-close-button" type="button" title="閉じる">
              ×
            </button>
            <div>
              <p>monthly review</p>
              <h2 id="reviewTitle"></h2>
            </div>
          </header>

          <div id="reviewEmptyState" class="review-empty-state" hidden>
            この月の日記はありません。
          </div>

          <article id="reviewSlide" class="review-slide" hidden>
            <div id="reviewPhotoFrame" class="review-photo-frame" hidden>
              <img id="reviewPhoto" alt="振り返り写真" />
            </div>
            <div class="review-slide-text">
              <p id="reviewDate" class="review-date"></p>
              <h3 id="reviewSlideTitle"></h3>
              <p id="reviewSlideBody"></p>
            </div>
          </article>

          <footer class="review-controls">
            <div class="review-progress-track" aria-hidden="true">
              <div id="reviewProgressBar" class="review-progress-bar"></div>
            </div>
            <div class="review-control-row">
              <button id="prevReviewButton" type="button">前へ</button>
              <button id="playReviewButton" class="review-play-button" type="button">再生</button>
              <button id="nextReviewButton" type="button">次へ</button>
            </div>
            <p id="reviewCounter" class="review-counter"></p>
          </footer>
        </section>
      </dialog>

      <section id="updateNotice" class="update-notice" aria-live="polite" hidden>
        <div>
          <strong>新しい版があります</strong>
          <span>更新すると最新の画面に切り替わります。</span>
        </div>
        <button id="reloadUpdateButton" type="button">更新</button>
        <button id="dismissUpdateButton" class="update-dismiss-button" type="button" title="閉じる">×</button>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
